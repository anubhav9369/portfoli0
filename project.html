<head>

<style>
:root{
  --bg:#06090d;--bg2:#090d13;--bg3:#0d131c;
  --fg:#f0f5fa;--fg2:#9fb2c5;--fg3:#5a6b7d;
  --border:#1a2634;--border2:#243140;
  --accent:#00e5a0;--dim:rgba(0,229,160,.07);
  --card:#0b1118;--card2:#0f1722;
  --glow:0 0 40px rgba(0,229,160,.18);
  --radius:16px;--radius-sm:10px;--maxw:1100px;
}
[data-theme="light"]{
  --bg:#f4f6fa;--bg2:#eceff5;--bg3:#e2e7ef;
  --fg:#0b1622;--fg2:#3c5168;--fg3:#7b93ab;
  --border:#d4dde8;--border2:#c2cfdd;--card:#fff;--card2:#f6f9fc;--dim:rgba(0,180,110,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--fg);font-family:'Space Grotesk',sans-serif;line-height:1.6;transition:background .4s,color .4s;}
a{color:inherit;text-decoration:none;}
img{max-width:100%;display:block;}
::selection{background:rgba(0,229,160,.25);}
::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;}
.serif{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;}
.mono{font-family:'JetBrains Mono',monospace;}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;}

/* NAV */
#nav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:300;display:flex;align-items:center;gap:6px;background:rgba(11,17,24,.7);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:50px;padding:7px 8px 7px 18px;}
[data-theme="light"] #nav{background:rgba(255,255,255,.72);}
.nav-logo{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;margin-right:14px;}
.nav-logo span{color:var(--accent);}
.nav-links{display:flex;gap:2px;}
.nav-links a{font-size:13.5px;color:var(--fg2);padding:8px 15px;border-radius:40px;transition:all .2s;font-weight:500;}
.nav-links a:hover{color:var(--fg);background:var(--dim);}
.nav-cta{font-size:13px;font-weight:600;background:var(--accent);color:#04130d;padding:9px 18px;border-radius:40px;margin-left:6px;transition:all .25s;}
.nav-cta:hover{background:#00ffc0;box-shadow:var(--glow);}
@media(max-width:720px){.nav-links{display:none;}#nav{left:16px;right:16px;transform:none;}}

/* HERO COVER */
.proj-hero{padding:120px 0 0;}
.proj-cover{position:relative;aspect-ratio:16/7;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:linear-gradient(135deg,var(--card2),var(--bg3));}
.proj-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;z-index:2;}
.proj-cover .ph{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--fg3);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;}
.proj-cover .ph svg{width:40px;height:40px;opacity:.4;}

/* BREADCRUMB + HEAD */
.proj-head{padding:44px 0 0;}
.crumb{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--fg3);margin-bottom:22px;display:flex;gap:8px;align-items:center;}
.crumb a:hover{color:var(--accent);}
.crumb .sep{opacity:.5;}
.crumb .cur{color:var(--accent);}
.proj-title{font-size:clamp(2.2rem,5vw,3.6rem);font-weight:600;letter-spacing:-.03em;line-height:1.05;margin-bottom:20px;}
.proj-tagline{font-size:18px;color:var(--fg2);line-height:1.75;max-width:680px;}

/* META GRID */
.proj-meta{display:grid;grid-template-columns:1.2fr 1.4fr;gap:40px;padding:44px 0;margin-top:36px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.meta-cols{display:grid;grid-template-columns:1fr 1fr;gap:26px 20px;}
.meta-item .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg3);margin-bottom:7px;}
.meta-item .v{font-size:15px;font-weight:500;}
.meta-item .v a{color:var(--accent);display:inline-flex;align-items:center;gap:6px;}
.meta-item .v a:hover{text-decoration:underline;}
.meta-stack .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg3);margin-bottom:14px;}
.stack-chips{display:flex;flex-wrap:wrap;gap:8px;}
.stack-chips span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg2);border:1px solid var(--border);padding:6px 12px;border-radius:8px;transition:all .2s;}
.stack-chips span:hover{border-color:var(--accent);color:var(--accent);}

/* CONTENT SECTIONS */
.proj-body{padding:64px 0 100px;}
.proj-section{display:grid;grid-template-columns:1fr 1.6fr;gap:48px;padding:48px 0;border-bottom:1px solid var(--border);}
.proj-section:first-child{padding-top:0;}
.proj-section:last-child{border-bottom:none;}
.ps-head .num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);margin-bottom:10px;}
.ps-head h2{font-size:24px;font-weight:600;letter-spacing:-.02em;position:sticky;top:90px;}
.ps-body p{font-size:16px;color:var(--fg2);line-height:1.9;margin-bottom:18px;}
.ps-body p:last-child{margin-bottom:0;}
.ps-body em{color:var(--fg);font-style:normal;font-weight:600;}
.ps-img{margin-top:26px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);background:linear-gradient(135deg,var(--card2),var(--bg3));aspect-ratio:16/9;position:relative;}
.ps-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;z-index:2;}
.ps-img img.contain,.proj-cover img.contain{object-fit:contain;object-position:center;padding:14px;}
.ps-shots{margin-top:26px;display:flex;flex-direction:column;gap:14px;}
.ps-shots img{width:100%;height:auto;display:block;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card2);}
.ps-img .ph{position:absolute;inset:0;z-index:1;color:var(--fg3);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;text-align:center;}
.ps-img .ph svg{width:28px;height:28px;opacity:.4;}
/* code snippet window */
.ps-code{margin-top:26px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);background:#080d14;box-shadow:0 18px 40px rgba(0,0,0,.35);}
.ps-code .bar{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid var(--border);background:#0c121c;}
.ps-code .bar i{width:11px;height:11px;border-radius:50%;display:block;}
.ps-code .bar i.r{background:#ff5f57;}.ps-code .bar i.y{background:#febc2e;}.ps-code .bar i.g{background:#28c840;}
.ps-code .bar .fname{margin-left:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg3);}
.ps-code pre{margin:0;padding:18px 20px;overflow-x:auto;}
.ps-code code{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.75;color:#c3d2e3;white-space:pre;display:block;}
.ps-code .c{color:#00e5a0;opacity:.85;font-style:italic;}
.ps-code .s{color:#e0a878;}
.ps-code::-webkit-scrollbar{height:6px;}

/* NEXT / FOOTER */
.proj-next{padding:60px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;}
.proj-next .label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);margin-bottom:8px;}
.proj-next h3{font-size:24px;font-weight:600;letter-spacing:-.02em;}
.btn-g{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--border2);color:var(--fg);font-size:14px;font-weight:500;padding:14px 26px;cursor:pointer;background:none;border-radius:50px;transition:all .25s;}
.btn-g:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);}
.btn-g svg{width:15px;height:15px;}
footer{border-top:1px solid var(--border);padding:40px 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg3);}
footer a{color:var(--accent);}

@media(max-width:820px){
  .proj-meta{grid-template-columns:1fr;gap:30px;}
  .proj-section{grid-template-columns:1fr;gap:18px;}
  .ps-head h2{position:static;}
}

/* reveal */
[data-r]{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease;}
[data-r].vis{opacity:1;transform:none;}
.notfound{padding:200px 0;text-align:center;}
.notfound h1{font-size:2rem;margin-bottom:14px;}
.notfound p{color:var(--fg2);margin-bottom:24px;}
</style>
</head>

const ORDER = ["misinformation","brain-tumor","grant-eval","papermind","spendly","medisimplify","clackr","resume-ai"];

/* ═══ RENDER ═══ */
function imgPh(label){return `<div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>${label}</div>`;}

/* lightweight code highlighter (comments + strings) */
function hl(code){
  return code.split('\n').map(line=>{
    let e=line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    e=e.replace(/("[^"]*"|'[^']*')/g,'<span class="s">$1</span>');
    e=e.replace(/(#.*$|\/\/.*$)/g,'<span class="c">$1</span>');
    return e;
  }).join('\n');
}
function codeBlock(file,code){
  return `<div class="ps-code"><div class="bar"><i class="r"></i><i class="y"></i><i class="g"></i><span class="fname">${file}</span></div><pre><code>${hl(code)}</code></pre></div>`;
}

function getParam(){const u=new URLSearchParams(location.search);return u.get('p')||u.get('id')||'';}

function render(){
  const root=document.getElementById('proj-root');
  const id=getParam();
  const p=PROJECTS[id];
  if(!p){
    document.title='Project not found — Anubhav Verma';
    root.innerHTML=`<div class="notfound"><h1>Project not found</h1><p>That project doesn't exist (yet).</p><a href="index.html#work" class="btn-g">← Back to all projects</a></div>`;
    return;
  }
  document.title=`${p.name} — Anubhav Verma`;

  const cls = p.portrait ? ' class="contain"' : '';
  const cover=`<div class="proj-cover"><img src="${p.cover}"${cls} alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/><div class="ph" style="display:none;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>Cover image</div></div>`;

  const visit = p.visit ? `<div class="meta-item"><div class="k">Visit</div><div class="v"><a href="${p.visit}" target="_blank" rel="noopener">Live demo ↗</a></div></div>` : '';
  const source = p.source ? `<div class="meta-item"><div class="k">Source</div><div class="v"><a href="${p.source}" target="_blank" rel="noopener">GitHub ↗</a></div></div>` : '';

  const meta=`
    <div class="proj-meta" data-r>
      <div class="meta-cols">
        <div class="meta-item"><div class="k">Type</div><div class="v">${p.type}</div></div>
        <div class="meta-item"><div class="k">Role</div><div class="v">${p.role}</div></div>
        <div class="meta-item"><div class="k">Built</div><div class="v">${p.built}</div></div>
        <div class="meta-item"><div class="k">Updated</div><div class="v">${p.updated}</div></div>
        ${visit}${source}
      </div>
      <div class="meta-stack">
        <div class="k">Tech Stack</div>
        <div class="stack-chips">${p.tech.map(t=>`<span>${t}</span>`).join('')}</div>
      </div>
    </div>`;

  const sections=p.sections.map((s,i)=>`
    <div class="proj-section" data-r>
      <div class="ps-head"><div class="num">0${i+1}</div><h2>${s.title}</h2></div>
      <div class="ps-body">
        ${s.body.map(b=>`<p>${b}</p>`).join('')}
        ${s.code?codeBlock(s.file||'snippet.py',s.code):s.imgs?`<div class="ps-shots">${s.imgs.map(src=>`<img src="${src}" alt="" loading="lazy"/>`).join('')}</div>`:(s.img?`<div class="ps-img"><img src="${s.img}"${cls} alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/>${imgPh('Screenshot')}</div>`:'')}
      </div>
    </div>`).join('');

  // next project
  const idx=ORDER.indexOf(id);
  const nextId=ORDER[(idx+1)%ORDER.length];
  const next=PROJECTS[nextId];
  const nextBlock=`
    <div class="proj-next">
      <div><div class="label">Next project</div><h3>${next.name}</h3></div>
      <a href="project.html?p=${nextId}" class="btn-g">View next <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>
    </div>`;

  root.innerHTML=`
    <section class="proj-hero">${cover}</section>
    <section class="proj-head">
      <div class="crumb"><a href="index.html">Home</a><span class="sep">/</span><a href="index.html#work">Projects</a><span class="sep">/</span><span class="cur">${p.name}</span></div>
      <h1 class="proj-title">${p.name}</h1>
      <p class="proj-tagline">${p.tagline}</p>
    </section>
    ${meta}
    <section class="proj-body">${sections}</section>
    ${nextBlock}`;

  // reveal
  const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('vis');}),{threshold:.1});
  document.querySelectorAll('[data-r]').forEach(el=>obs.observe(el));
  window.scrollTo(0,0);
}
render();
</script>
